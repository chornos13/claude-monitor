<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Monitor</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <main class="container">
        <header class="glass-header">
            <div class="logo-container">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="#8B5CF6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M2 17L12 22L22 17" stroke="#8B5CF6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M2 12L12 17L22 12" stroke="#8B5CF6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <h1>Claude Monitor</h1>
            </div>
            <button id="refresh-btn" class="btn primary-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M23 4v6h-6"></path>
                    <path d="M1 20v-6h6"></path>
                    <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                </svg>
                <span>Refresh Status</span>
            </button>
        </header>

        <section class="glass-card terminal-container">
            <div class="terminal-header">
                <div class="window-controls">
                    <span class="control close"></span>
                    <span class="control minimize"></span>
                    <span class="control maximize"></span>
                </div>
                <div class="terminal-title">cswap --list <span id="last-update" class="last-update-text"></span></div>
            </div>
            <div class="terminal-body">
                <div id="error" class="error-state hidden" style="grid-column: 1 / -1;">
                    <p>Failed to load data.</p>
                </div>
                <div id="native-output" class="native-container">
                    <!-- Skeleton Placeholder to prevent layout shift -->
                    <div class="skeleton-container">
                        <div class="skeleton-title"></div>
                        <div class="skeleton-cards">
                            <div class="skeleton-card"></div>
                            <div class="skeleton-card"></div>
                            <div class="skeleton-card"></div>
                        </div>
                        <div class="skeleton-title" style="margin-top:1rem"></div>
                        <div class="skeleton-cards">
                            <div class="skeleton-card" style="height: 60px"></div>
                            <div class="skeleton-card" style="height: 60px"></div>
                        </div>
                    </div>
                </div>

                <!-- Audit Log Section -->
                <div id="audit-log-section" class="audit-section">
                    <div class="section-title" style="margin-top: 0; justify-content: space-between;">
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                            Audit Logs
                        </div>
                        <div style="display: flex; gap: 6px;">
                            <button id="refresh-logs-btn" class="btn" style="background: rgba(255,255,255,0.05); padding: 4px 10px; font-size: 0.75rem;">Refresh Logs</button>
                            <button id="clear-logs-btn" class="btn" style="background: rgba(220,50,50,0.15); color: #fca5a5; padding: 4px 10px; font-size: 0.75rem;">Clear Logs</button>
                        </div>
                    </div>
                    <div class="audit-terminal">
                        <pre id="audit-output">Loading logs...</pre>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <script src="app.js"></script>
</body>
</html>
