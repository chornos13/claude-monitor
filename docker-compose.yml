services:
  claude-monitor:
    build: .
    container_name: claude-monitor
    ports:
      - "3005:3005"
    volumes:
      # Mount the host home so cswap's atomic file replacement on
      # ~/.claude.json stays visible to the container (single-file bind
      # mounts pin an inode and break on rename).
      - ${HOME}:/home/woi
      # Persistence for the monitor state and logs
      - ./state.json:/home/node/app/state.json
      - ./audit.log:/home/node/app/audit.log
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3005
      - HOME=/home/woi
