services:
  claude-monitor:
    build: .
    container_name: claude-monitor
    ports:
      - "3005:3005"
    volumes:
      # Preserve account sessions from the host
      - ${HOME}/.claude:/home/woi/.claude
      - ${HOME}/.claude.json:/home/woi/.claude.json
      - ${HOME}/.local:/home/woi/.local
      # Persistence for the monitor state and logs
      - ./state.json:/home/node/app/state.json
      - ./audit.log:/home/node/app/audit.log
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3005
      - HOME=/home/woi
